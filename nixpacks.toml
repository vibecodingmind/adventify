# Railway deployment configuration for Adventify

[phases.setup]
nixPkgs = ["...", "postgresql"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[phases.start]
cmds = ["npx prisma migrate deploy 2>/dev/null || true", "npx next start -p ${PORT:-3000}"]

[variables]
NODE_ENV = "production"
NPM_FLAGS = "--legacy-peer-deps"
